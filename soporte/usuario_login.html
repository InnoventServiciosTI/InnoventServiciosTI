<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuario Login | Innovent TI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="auth-body">

  <div class="login-box">
    <h2>Seccion Usuario</h2>
    <p>Ingresa las credenciales otorgadas por el administrador.</p>

    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
    <p id="error" class="error"></p>
    <h2 class="volver-atras">
      <a href="../index.html">Volver atrás</a>
    </h2>
  </div>

<script>
function login(){
  const email = document.getElementById("email").value;
  const pass  = document.getElementById("password").value;

  if(email === "usuario@innovent.com" && pass === "Usuario123*"){
    localStorage.setItem("adminAuth","true");
    window.location.href = "dashboard.html";
  }else{
    document.getElementById("error").innerText = "Credenciales incorrectas";
  }
}
</script>

</body>
</html>
